<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자리 배치기</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: #e0ddd6;
    --text: #1a1a1a;
    --sub: #888;
    --male: #4a90d9;
    --female: #e06a8c;
    --male-light: #dceeff;
    --female-light: #fde8ef;
    --accent: #3a7bd5;
    --empty: #ebebeb;
  }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px;
  }

  h1 {
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 24px;
    letter-spacing: -0.5px;
  }

  .layout {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 20px;
    max-width: 1100px;
    margin: 0 auto;
  }

  @media (max-width: 800px) {
    .layout { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }

  .panel-title {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--sub);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 14px;
  }

  /* ── 교실 설정 ── */
  .grid-setting {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 10px;
  }

  .grid-setting label { font-size: 0.85rem; color: var(--sub); white-space: nowrap; }

  input[type="number"] {
    width: 60px;
    padding: 6px 8px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 0.9rem;
    font-family: inherit;
    text-align: center;
  }

  /* ── 버튼 ── */
  .btn {
    display: inline-block;
    padding: 8px 16px;
    border-radius: 7px;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 500;
    transition: filter 0.15s;
  }
  .btn:hover { filter: brightness(0.93); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--border); color: var(--text); }
  .btn-danger { background: #fde8ef; color: #c0395a; }
  .btn-sm { padding: 5px 10px; font-size: 0.78rem; }
  .btn-full { width: 100%; }

  /* ── 학생 입력 ── */
  .student-input-row {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
  }

  .student-input-row input[type="text"] {
    flex: 1;
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: inherit;
    font-size: 0.88rem;
  }

  .gender-toggle {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .gender-toggle button {
    padding: 6px 10px;
    border: none;
    background: transparent;
    cursor: pointer;
    font-size: 0.82rem;
    font-family: inherit;
    transition: background 0.15s, color 0.15s;
  }

  .gender-toggle button.active-m { background: var(--male); color: #fff; }
  .gender-toggle button.active-f { background: var(--female); color: #fff; }

  /* ── 학생 목록 ── */
  .student-list {
    max-height: 220px;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 12px;
  }

  .student-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 10px;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
  }
  .student-item:last-child { border-bottom: none; }

  .student-badge {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 500;
    margin-left: 6px;
  }
  .badge-m { background: var(--male-light); color: var(--male); }
  .badge-f { background: var(--female-light); color: var(--female); }

  .student-count { font-size: 0.78rem; color: var(--sub); margin-bottom: 8px; }

  /* ── 오른쪽 패널 ── */
  .right-panel { display: flex; flex-direction: column; gap: 16px; }

  /* ── 자리 에디터 ── */
  .classroom-wrap {
    overflow-x: auto;
    padding-bottom: 8px;
  }

  .classroom-grid {
    display: inline-grid;
    gap: 6px;
    margin: 0 auto;
  }

  .seat {
    width: 52px;
    height: 52px;
    border-radius: 8px;
    border: 2px solid transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.72rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    line-height: 1.2;
    user-select: none;
    position: relative;
  }

  .seat.empty    { background: var(--empty); color: #aaa; border-color: #ddd; }
  .seat.male     { background: var(--male-light); color: var(--male); border-color: var(--male); }
  .seat.female   { background: var(--female-light); color: var(--female); border-color: var(--female); }
  .seat.unset    { background: #fff; border: 2px dashed #ccc; color: #bbb; }
  .seat:hover:not(.result-mode) { transform: scale(1.06); }

  .seat .seat-name { font-size: 0.7rem; line-height: 1.2; word-break: break-all; }

  .board-label {
    text-align: center;
    font-size: 0.75rem;
    color: var(--sub);
    padding: 6px 0 10px;
    letter-spacing: 0.5px;
  }

  /* ── 범례 ── */
  .legend {
    display: flex;
    gap: 12px;
    font-size: 0.78rem;
    color: var(--sub);
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .legend-dot {
    width: 12px; height: 12px;
    border-radius: 3px;
    display: inline-block;
    margin-right: 4px;
    vertical-align: middle;
  }

  /* ── 결과 ── */
  .result-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .msg { font-size: 0.83rem; padding: 10px 12px; border-radius: 8px; margin-bottom: 8px; }
  .msg-error { background: #fff0f0; color: #c0395a; border: 1px solid #f9c; }
  .msg-success { background: #efffee; color: #2a7a3b; border: 1px solid #9de; }

  hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

  .action-row { display: flex; gap: 8px; flex-wrap: wrap; }

  /* ── 모드 탭 ── */
  .mode-tabs {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 14px;
  }
  .mode-tab {
    flex: 1;
    padding: 7px 0;
    border: none;
    background: transparent;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--sub);
    transition: background 0.15s, color 0.15s;
  }
  .mode-tab.active { background: var(--accent); color: #fff; }

  /* ── 텍스트 모드 ── */
  .text-mode-wrap textarea {
    width: 100%;
    height: 100px;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.85rem;
    resize: vertical;
    line-height: 1.6;
    margin-bottom: 8px;
  }
  .text-mode-hint {
    font-size: 0.75rem;
    color: var(--sub);
    margin-bottom: 10px;
    line-height: 1.6;
    background: var(--bg);
    padding: 8px 10px;
    border-radius: 6px;
  }
  .text-mode-hint code {
    background: #e8e8e8;
    padding: 1px 4px;
    border-radius: 3px;
    font-family: monospace;
  }
</style>
</head>
<body>

<h1>🪑 자리 배치기</h1>

<div class="layout">
  <!-- ── 왼쪽 패널 ── -->
  <div>
    <!-- 교실 설정 -->
    <div class="panel" style="margin-bottom:16px">
      <div class="panel-title">① 교실 설정</div>
      <div class="grid-setting">
        <label>열(가로)</label>
        <input type="number" id="cols" value="6" min="1" max="12">
        <label>줄(세로)</label>
        <input type="number" id="rows" value="5" min="1" max="10">
        <button class="btn btn-secondary btn-sm" onclick="applyGrid()">적용</button>
      </div>
      <div style="font-size:0.78rem;color:var(--sub)">자리를 클릭해서 남/여/빈자리를 지정하세요.</div>
    </div>

    <!-- 학생 명단 -->
    <div class="panel">
      <div class="panel-title">② 학생 명단</div>

      <!-- 모드 탭 -->
      <div class="mode-tabs">
        <button class="mode-tab active" id="tabOne" onclick="switchMode('one')">✏️ 한 명씩 입력</button>
        <button class="mode-tab" id="tabText" onclick="switchMode('text')">📋 텍스트로 입력</button>
      </div>

      <!-- 한 명씩 모드 -->
      <div id="modeOne">
        <div class="student-input-row">
          <input type="text" id="nameInput" placeholder="이름 입력" maxlength="8" onkeydown="if(event.key==='Enter')addStudent()">
          <div class="gender-toggle">
            <button id="btnM" onclick="setGender('m')" class="active-m">남</button>
            <button id="btnF" onclick="setGender('f')">여</button>
          </div>
          <button class="btn btn-primary btn-sm" onclick="addStudent()">추가</button>
        </div>
      </div>

      <!-- 텍스트 모드 -->
      <div id="modeText" style="display:none">
        <div class="text-mode-hint">
          형식: <code>남: 홍길동 이순신 장보고</code> / <code>여: 유관순 신사임당</code><br>
          띄어쓰기로 이름 구분, 줄바꿈 또는 <code>/</code>로 남/여 구분
        </div>
        <div class="text-mode-wrap">
          <textarea id="textInput" placeholder="남: 홍길동 이순신 장보고&#10;여: 유관순 신사임당"></textarea>
        </div>
        <button class="btn btn-primary btn-sm btn-full" onclick="parseTextInput()">📥 명단 불러오기</button>
      </div>

      <hr>
      <div class="student-count" id="studentCount">학생 0명 (남 0 / 여 0)</div>
      <div class="student-list" id="studentList"></div>
      <button class="btn btn-secondary btn-sm btn-full" onclick="clearStudents()">명단 초기화</button>
    </div>
  </div>

  <!-- ── 오른쪽 패널 ── -->
  <div class="right-panel">
    <!-- 자리 에디터 -->
    <div class="panel">
      <div class="panel-title">③ 자리 성별 지정</div>
      <div class="legend">
        <span><span class="legend-dot" style="background:var(--male-light);border:1px solid var(--male)"></span>남자 자리</span>
        <span><span class="legend-dot" style="background:var(--female-light);border:1px solid var(--female)"></span>여자 자리</span>
        <span><span class="legend-dot" style="background:var(--empty);border:1px solid #ddd"></span>빈 자리</span>
        <span><span class="legend-dot" style="background:#fff;border:2px dashed #ccc"></span>미지정</span>
      </div>
      <div class="board-label">📋 칠판</div>
      <div class="classroom-wrap">
        <div class="classroom-grid" id="seatGrid"></div>
      </div>
      <div style="margin-top:10px;font-size:0.78rem;color:var(--sub)">클릭 순서: 미지정 → 남 → 여 → 빈자리 → 미지정</div>
    </div>

    <!-- 배치 실행 -->
    <div class="panel">
      <div class="panel-title">④ 배치 실행</div>
      <div id="msgBox"></div>
      <div class="action-row">
        <button class="btn btn-primary" onclick="arrange()">🎲 랜덤 배치!</button>
        <button class="btn btn-secondary" onclick="clearResult()">결과 초기화</button>
      </div>
    </div>

    <!-- 결과 -->
    <div class="panel" id="resultPanel" style="display:none">
      <div class="result-header">
        <div class="panel-title" style="margin:0">배치 결과</div>
        <button class="btn btn-secondary btn-sm" onclick="arrange()">🔄 다시 배치</button>
      </div>
      <div class="board-label">📋 칠판</div>
      <div class="classroom-wrap">
        <div class="classroom-grid result-mode" id="resultGrid"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── 상태 ──
let cols = 6, rows = 5;
// 'unset' | 'm' | 'f' | 'empty'
let seatTypes = [];
let students = [];
let currentGender = 'm';

// ── 초기화 ──
function init() {
  cols = parseInt(document.getElementById('cols').value);
  rows = parseInt(document.getElementById('rows').value);
  seatTypes = Array(rows * cols).fill('unset');
  renderGrid();
}

function applyGrid() {
  const nc = parseInt(document.getElementById('cols').value);
  const nr = parseInt(document.getElementById('rows').value);
  if (nc < 1 || nr < 1) return;
  // 기존 데이터 유지하면서 크기 조정
  const old = seatTypes.slice();
  const oldCols = cols, oldRows = rows;
  cols = nc; rows = nr;
  seatTypes = [];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const oldIdx = r * oldCols + c;
      if (r < oldRows && c < oldCols) {
        seatTypes.push(old[oldIdx]);
      } else {
        seatTypes.push('unset');
      }
    }
  }
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('seatGrid');
  grid.style.gridTemplateColumns = `repeat(${cols}, 52px)`;
  grid.innerHTML = '';
  for (let i = 0; i < rows * cols; i++) {
    const seat = document.createElement('div');
    seat.className = 'seat ' + typeToClass(seatTypes[i]);
    seat.textContent = typeToLabel(seatTypes[i]);
    seat.onclick = () => cycleSeat(i);
    grid.appendChild(seat);
  }
}

function typeToClass(t) {
  return { unset: 'unset', m: 'male', f: 'female', empty: 'empty' }[t] || 'unset';
}
function typeToLabel(t) {
  return { unset: '?', m: '남', f: '여', empty: '✕' }[t] || '?';
}

function cycleSeat(i) {
  const order = ['unset', 'm', 'f', 'empty'];
  const cur = order.indexOf(seatTypes[i]);
  seatTypes[i] = order[(cur + 1) % order.length];
  renderGrid();
}

// ── 모드 전환 ──
function switchMode(mode) {
  document.getElementById('modeOne').style.display  = mode === 'one'  ? '' : 'none';
  document.getElementById('modeText').style.display = mode === 'text' ? '' : 'none';
  document.getElementById('tabOne').classList.toggle('active',  mode === 'one');
  document.getElementById('tabText').classList.toggle('active', mode === 'text');
}

// ── 텍스트 파싱 ──
function parseTextInput() {
  const raw = document.getElementById('textInput').value;
  // '/' 를 줄바꿈으로 통일
  const lines = raw.replace(/\//g, '\n').split('\n').map(l => l.trim()).filter(Boolean);

  let added = 0;
  const errors = [];

  lines.forEach(line => {
    // 남: ... 또는 여: ... 형식
    const mMatch = line.match(/^남\s*[:：]\s*(.+)/);
    const fMatch = line.match(/^여\s*[:：]\s*(.+)/);
    if (mMatch) {
      mMatch[1].trim().split(/\s+/).forEach(name => {
        if (name) { students.push({ name, gender: 'm' }); added++; }
      });
    } else if (fMatch) {
      fMatch[1].trim().split(/\s+/).forEach(name => {
        if (name) { students.push({ name, gender: 'f' }); added++; }
      });
    } else if (line) {
      errors.push(`인식 불가: "${line}"`);
    }
  });

  renderStudentList();

  const msgBox = document.getElementById('msgBox');
  if (errors.length) {
    msgBox.innerHTML = `<div class="msg msg-error">⚠️ ${errors.join('<br>')}</div>`;
  }
  if (added > 0) {
    document.getElementById('textInput').value = '';
    // 성공 메시지는 msgBox가 아닌 간단 알림
    const prev = msgBox.innerHTML;
    msgBox.innerHTML = `<div class="msg msg-success">✅ ${added}명 추가됨</div>` + prev;
    setTimeout(() => {
      // 성공 메시지만 제거
      const s = msgBox.querySelector('.msg-success');
      if (s) s.remove();
    }, 2000);
  }
}


function setGender(g) {
  currentGender = g;
  document.getElementById('btnM').className = g === 'm' ? 'active-m' : '';
  document.getElementById('btnF').className = g === 'f' ? 'active-f' : '';
}

// ── 학생 관리 ──
function addStudent() {
  const input = document.getElementById('nameInput');
  const name = input.value.trim();
  if (!name) return;
  students.push({ name, gender: currentGender });
  input.value = '';
  input.focus();
  renderStudentList();
}

function removeStudent(i) {
  students.splice(i, 1);
  renderStudentList();
}

function clearStudents() {
  if (students.length && !confirm('명단을 초기화할까요?')) return;
  students = [];
  renderStudentList();
}

function renderStudentList() {
  const list = document.getElementById('studentList');
  const mCount = students.filter(s => s.gender === 'm').length;
  const fCount = students.filter(s => s.gender === 'f').length;
  document.getElementById('studentCount').textContent =
    `학생 ${students.length}명 (남 ${mCount} / 여 ${fCount})`;

  list.innerHTML = '';
  students.forEach((s, i) => {
    const item = document.createElement('div');
    item.className = 'student-item';
    item.innerHTML = `
      <span>${s.name}<span class="student-badge ${s.gender === 'm' ? 'badge-m' : 'badge-f'}">${s.gender === 'm' ? '남' : '여'}</span></span>
      <button class="btn btn-danger btn-sm" onclick="removeStudent(${i})">삭제</button>
    `;
    list.appendChild(item);
  });
}

// ── 배치 ──
function arrange() {
  const msgBox = document.getElementById('msgBox');
  msgBox.innerHTML = '';

  const mSeats = seatTypes.map((t, i) => t === 'm' ? i : -1).filter(i => i >= 0);
  const fSeats = seatTypes.map((t, i) => t === 'f' ? i : -1).filter(i => i >= 0);
  const mStudents = students.filter(s => s.gender === 'm');
  const fStudents = students.filter(s => s.gender === 'f');

  // 검증
  const errors = [];
  if (mStudents.length > mSeats.length)
    errors.push(`남학생 ${mStudents.length}명인데 남자 자리가 ${mSeats.length}개예요.`);
  if (fStudents.length > fSeats.length)
    errors.push(`여학생 ${fStudents.length}명인데 여자 자리가 ${fSeats.length}개예요.`);

  if (errors.length) {
    msgBox.innerHTML = errors.map(e => `<div class="msg msg-error">⚠️ ${e}</div>`).join('');
    return;
  }

  // 셔플
  const shuffleM = shuffle(mStudents.map(s => s.name));
  const shuffleF = shuffle(fStudents.map(s => s.name));
  const shuffledMSeats = shuffle(mSeats);
  const shuffledFSeats = shuffle(fSeats);

  const result = Array(rows * cols).fill(null);
  seatTypes.forEach((t, i) => { if (t === 'empty') result[i] = 'empty'; });

  shuffleM.forEach((name, i) => { result[shuffledMSeats[i]] = { name, gender: 'm' }; });
  shuffleF.forEach((name, i) => { result[shuffledFSeats[i]] = { name, gender: 'f' }; });
  // 남은 남자/여자 자리 (학생 없는 경우)
  shuffledMSeats.slice(shuffleM.length).forEach(i => { result[i] = 'empty-seat'; });
  shuffledFSeats.slice(shuffleF.length).forEach(i => { result[i] = 'empty-seat'; });

  renderResult(result);
  msgBox.innerHTML = `<div class="msg msg-success">✅ 배치 완료!</div>`;
}

function renderResult(result) {
  const panel = document.getElementById('resultPanel');
  const grid = document.getElementById('resultGrid');
  panel.style.display = 'block';
  grid.style.gridTemplateColumns = `repeat(${cols}, 52px)`;
  grid.innerHTML = '';

  result.forEach(cell => {
    const seat = document.createElement('div');
    seat.className = 'seat result-mode ';
    if (!cell) {
      seat.className += 'unset';
      seat.textContent = '?';
    } else if (cell === 'empty' || cell === 'empty-seat') {
      seat.className += 'empty';
      seat.textContent = '✕';
    } else {
      seat.className += cell.gender === 'm' ? 'male' : 'female';
      seat.innerHTML = `<span class="seat-name">${cell.name}</span>`;
    }
    grid.appendChild(seat);
  });

  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function clearResult() {
  document.getElementById('resultPanel').style.display = 'none';
  document.getElementById('msgBox').innerHTML = '';
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── 시작 ──
init();
</script>
</body>
</html>
