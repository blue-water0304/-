<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자리 배치기 Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: #e0ddd6;
    --text: #1a1a1a;
    --sub: #888;
    --male: #4a90d9;
    --female: #e06a8c;
    --male-light: #dceeff;
    --female-light: #fde8ef;
    --accent: #3a7bd5;
    --empty: #ebebeb;
  }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px;
  }

  h1 {
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 24px;
    letter-spacing: -0.5px;
    text-align: center;
  }

  .layout {
    display: grid;
    grid-template-columns: 340px 1fr; /* 사이드바 너비 소폭 확장 */
    gap: 20px;
    max-width: 1200px;
    margin: 0 auto;
  }

  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }

  .panel-title {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--sub);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 14px;
  }

  /* ─── UI 텍스트 밀림 해결 ─── */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 8px 16px;
    border-radius: 7px;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 500;
    transition: filter 0.15s;
    white-space: nowrap; /* 텍스트 줄바꿈 방지 */
    flex-shrink: 0;      /* 크기 줄어듦 방지 */
  }
  .btn:hover { filter: brightness(0.93); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--border); color: var(--text); }
  .btn-danger { background: #fde8ef; color: #c0395a; }
  .btn-sm { padding: 5px 12px; font-size: 0.78rem; min-width: fit-content; }
  .btn-full { width: 100%; }

  .grid-setting {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 10px;
    flex-wrap: nowrap; /* 설정 줄바꿈 방지 */
  }

  .student-input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    align-items: center;
  }

  .gender-toggle {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    flex-shrink: 0;
  }

  .gender-toggle button {
    padding: 6px 12px;
    border: none;
    background: transparent;
    cursor: pointer;
    font-size: 0.82rem;
    font-family: inherit;
    white-space: nowrap;
  }
  /* ────────────────────────── */

  .grid-setting label { font-size: 0.85rem; color: var(--sub); white-space: nowrap; }

  input[type="number"] {
    width: 50px;
    padding: 6px 4px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 0.9rem;
    text-align: center;
  }

  .gender-toggle button.active-m { background: var(--male); color: #fff; }
  .gender-toggle button.active-f { background: var(--female); color: #fff; }

  .student-list {
    max-height: 220px;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 12px;
  }

  .student-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 10px;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
  }

  .student-badge {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 500;
    margin-left: 6px;
  }
  .badge-m { background: var(--male-light); color: var(--male); }
  .badge-f { background: var(--female-light); color: var(--female); }

  .classroom-grid {
    display: inline-grid;
    gap: 6px;
    margin: 0 auto;
    padding: 10px; 
  }

  .seat {
    width: 52px;
    height: 52px;
    border-radius: 8px;
    border: 2px solid transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.72rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    line-height: 1.2;
    position: relative;
  }

  .seat.empty    { background: var(--empty); color: #aaa; border-color: #ddd; }
  .seat.male     { background: var(--male-light); color: var(--male); border-color: var(--male); }
  .seat.female   { background: var(--female-light); color: var(--female); border-color: var(--female); }
  .seat.unset    { background: #fff; border: 2px dashed #ccc; color: #bbb; }
  
  #seatGrid .seat.fixed-seat { border: 2px solid #555 !important; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }

  #countdownOverlay {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    background: rgba(0, 0, 0, 0.85);
    z-index: 9999;
    display: none; 
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  .count-number {
    font-size: 15rem;
    color: #ffffff;
    font-weight: 900;
  }

  @keyframes popIn {
    0% { transform: scale(0.3); opacity: 0; }
    60% { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* 블랙리스트 등 기타 스타일 유지 */
  .bl-item { display: flex; align-items: center; justify-content: space-between; background: #fff; border: 1px solid #ddd; padding: 6px 10px; border-radius: 6px; margin-bottom: 6px; font-size: 0.8rem; }
  .msg { font-size: 0.83rem; padding: 10px 12px; border-radius: 8px; margin-bottom: 8px; }
  .msg-success { background: #efffee; color: #2a7a3b; border: 1px solid #9de; }
  .msg-error { background: #fff0f0; color: #c0395a; border: 1px solid #f9c; }

</style>
</head>
<body>

<div id="countdownOverlay">
  <div id="countText" class="count-number">3</div>
</div>

<h1>🪑 자리 배치기 Pro</h1>

<div class="layout">
  <div>
    <div class="panel" style="margin-bottom:16px">
      <div class="panel-title">① 교실 설정</div>
      <div class="grid-setting">
        <label>열</label>
        <input type="number" id="cols" value="6" min="1">
        <label>줄</label>
        <input type="number" id="rows" value="5" min="1">
        <button class="btn btn-secondary btn-sm" onclick="applyGrid()">적용</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">② 학생 명단</div>
      
      <div class="student-input-row">
        <input type="text" id="nameInput" placeholder="이름" style="flex:1; padding:7px; border:1px solid var(--border); border-radius:6px;" onkeydown="if(event.key==='Enter')addStudent()">
        <div class="gender-toggle">
          <button id="btnM" onclick="setGender('m')" class="active-m">남</button>
          <button id="btnF" onclick="setGender('f')">여</button>
        </div>
        <button class="btn btn-primary btn-sm" onclick="addStudent()">추가</button>
      </div>

      <div class="student-count" id="studentCount" style="font-size:0.78rem; color:var(--sub); margin-bottom:8px;">학생 0명</div>
      <div class="student-list" id="studentList"></div>
      
      <div style="background: var(--empty); padding: 12px; border-radius: 8px; margin-top:10px;">
        <div style="font-size: 0.85rem; font-weight: 700; margin-bottom: 8px;">📌 고정석 지정</div>
        <div style="display: flex; gap: 6px;">
          <select id="fixedStudentSelect" style="flex: 1; padding:6px; border-radius:6px; border:1px solid var(--border);"></select>
          <button class="btn btn-primary btn-sm" id="btnFixedMode" onclick="toggleFixedMode()">자리 지정</button>
        </div>
      </div>
    </div>
  </div>

  <div class="right-panel">
    <div class="panel" style="margin-bottom:16px">
      <div class="panel-title">③ 배치 실행</div>
      <div id="msgBox"></div>
      <div class="action-row" style="display:flex; gap:10px;">
        <button class="btn btn-primary" onclick="checkAndStartCountdown()" style="font-size:1rem; padding: 10px 20px;">🎲 랜덤 배치 시작!</button>
        <button class="btn btn-secondary" onclick="clearStudents()">전체 초기화</button>
      </div>
    </div>

    <div id="seatPanel" class="panel">
      <div class="panel-title">배치 현황 / 결과</div>
      <div id="captureArea" style="text-align:center;">
        <div id="seatGrid" class="classroom-grid"></div>
      </div>
    </div>

    <div class="panel" id="dataManagementPanel" style="margin-top:16px;">
      <div class="panel-title">💾 데이터 관리</div>
      <div style="display:flex; gap:10px;">
        <button class="btn btn-secondary btn-sm" onclick="saveToLocalStorage()">현재 명단/설정 저장</button>
        <button class="btn btn-secondary btn-sm" onclick="loadFromLocalStorage()">저장된 데이터 불러오기</button>
        <button class="btn btn-primary btn-sm" onclick="downloadImage()">📸 결과 이미지 저장</button>
      </div>
      <div id="storageMsg" style="font-size:0.75rem; margin-top:8px; color:var(--accent);"></div>
    </div>
  </div>
</div>

<script>
let cols = 6, rows = 5;
let seatTypes = [];
let fixedSeats = [];
let students = [];
let currentGender = 'm';
let isFixedMode = false;
let pendingFixedStudent = null;

// 초기화
function init() {
  cols = parseInt(document.getElementById('cols').value);
  rows = parseInt(document.getElementById('rows').value);
  seatTypes = Array(rows * cols).fill('unset');
  fixedSeats = Array(rows * cols).fill(null);
  renderGrid();
  loadFromLocalStorage(true); // 시작 시 자동 로드 (조용히)
}

function renderGrid() {
  const grid = document.getElementById('seatGrid');
  grid.style.gridTemplateColumns = `repeat(${cols}, 52px)`;
  grid.innerHTML = '';
  for (let i = 0; i < rows * cols; i++) {
    const seat = document.createElement('div');
    if (fixedSeats[i]) {
      seat.className = 'seat fixed-seat ' + (fixedSeats[i].gender === 'm' ? 'male' : 'female');
      seat.innerHTML = `📌<br>${fixedSeats[i].name}`;
    } else {
      seat.className = 'seat ' + (seatTypes[i] || 'unset');
      seat.textContent = seatTypes[i] === 'm' ? '남' : seatTypes[i] === 'f' ? '여' : seatTypes[i] === 'empty' ? '✕' : '?';
    }
    seat.onclick = () => cycleSeat(i);
    grid.appendChild(seat);
  }
}

function cycleSeat(i) {
  if (isFixedMode && pendingFixedStudent) {
    fixedSeats[i] = pendingFixedStudent;
    seatTypes[i] = pendingFixedStudent.gender;
    toggleFixedMode();
    renderGrid();
    return;
  }
  if (fixedSeats[i]) {
    if(confirm('고정석을 해제할까요?')) { fixedSeats[i] = null; seatTypes[i] = 'unset'; renderGrid(); }
    return;
  }
  const order = ['unset', 'm', 'f', 'empty'];
  seatTypes[i] = order[(order.indexOf(seatTypes[i]) + 1) % order.length];
  renderGrid();
}

function addStudent() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) return;
  students.push({ name, gender: currentGender });
  document.getElementById('nameInput').value = '';
  updateStudentUI();
}

function updateStudentUI() {
  const list = document.getElementById('studentList');
  list.innerHTML = students.map((s, i) => `
    <div class="student-item">
      <span>${s.name} <span class="student-badge badge-${s.gender}">${s.gender==='m'?'남':'여'}</span></span>
      <button class="btn btn-danger btn-sm" onclick="removeStudent(${i})">삭제</button>
    </div>
  `).join('');
  
  const sel = document.getElementById('fixedStudentSelect');
  sel.innerHTML = '<option value="">선택...</option>' + students.map(s => `<option value="${s.name}">${s.name}</option>`).join('');
  document.getElementById('studentCount').textContent = `학생 ${students.length}명`;
}

function removeStudent(i) {
  students.splice(i, 1);
  updateStudentUI();
}

function setGender(g) {
  currentGender = g;
  document.getElementById('btnM').className = g === 'm' ? 'active-m' : '';
  document.getElementById('btnF').className = g === 'f' ? 'active-f' : '';
}

function applyGrid() {
  cols = parseInt(document.getElementById('cols').value);
  rows = parseInt(document.getElementById('rows').value);
  seatTypes = Array(rows * cols).fill('unset');
  fixedSeats = Array(rows * cols).fill(null);
  renderGrid();
}

function toggleFixedMode() {
  const name = document.getElementById('fixedStudentSelect').value;
  if (!isFixedMode && !name) return alert('학생을 선택하세요.');
  isFixedMode = !isFixedMode;
  pendingFixedStudent = isFixedMode ? students.find(s => s.name === name) : null;
  document.getElementById('btnFixedMode').textContent = isFixedMode ? '취소' : '자리 지정';
}

// 데이터 저장 기능 (1번 요청)
function saveToLocalStorage() {
  const data = { students, seatTypes, fixedSeats, cols, rows };
  localStorage.setItem('seatManagerData', JSON.stringify(data));
  showStorageMsg("✅ 현재 명단과 설정을 브라우저에 저장했습니다.");
}

function loadFromLocalStorage(silent = false) {
  const data = JSON.parse(localStorage.getItem('seatManagerData'));
  if (!data) {
    if (!silent) alert("저장된 데이터가 없습니다.");
    return;
  }
  students = data.students;
  seatTypes = data.seatTypes;
  fixedSeats = data.fixedSeats;
  cols = data.cols;
  rows = data.rows;
  document.getElementById('cols').value = cols;
  document.getElementById('rows').value = rows;
  updateStudentUI();
  renderGrid();
  if (!silent) showStorageMsg("📂 이전 데이터를 성공적으로 불러왔습니다.");
}

function showStorageMsg(text) {
  const msg = document.getElementById('storageMsg');
  msg.textContent = text;
  setTimeout(() => msg.textContent = "", 3000);
}

// 배치 및 카운트다운 로직
function checkAndStartCountdown() {
  const overlay = document.getElementById('countdownOverlay');
  const countText = document.getElementById('countText');
  let count = 3;
  overlay.style.display = 'flex';
  const timer = setInterval(() => {
    countText.textContent = count;
    countText.style.animation = 'popIn 0.5s';
    if (count === 0) {
      clearInterval(timer);
      overlay.style.display = 'none';
      arrangeSeats();
    }
    count--;
  }, 800);
}

function arrangeSeats() {
  const unassigned = students.filter(s => !fixedSeats.some(f => f && f.name === s.name));
  const mStudents = shuffle(unassigned.filter(s => s.gender === 'm'));
  const fStudents = shuffle(unassigned.filter(s => s.gender === 'f'));
  
  const mSeats = [], fSeats = [];
  seatTypes.forEach((t, i) => {
    if (!fixedSeats[i]) {
      if (t === 'm') mSeats.push(i);
      else if (t === 'f') fSeats.push(i);
    }
  });

  if (mStudents.length > mSeats.length || fStudents.length > fSeats.length) {
    alert("지정된 성별 자리수가 부족합니다. 자리를 더 지정해주세요.");
    return;
  }

  const grid = document.getElementById('seatGrid');
  const seats = grid.children;
  
  mStudents.forEach((s, i) => {
    const idx = mSeats[i];
    seats[idx].innerHTML = `<span style="font-weight:700">${s.name}</span>`;
  });
  fStudents.forEach((s, i) => {
    const idx = fSeats[i];
    seats[idx].innerHTML = `<span style="font-weight:700">${s.name}</span>`;
  });
}

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

function downloadImage() {
  html2canvas(document.getElementById('captureArea')).then(canvas => {
    const link = document.createElement('a');
    link.download = '자리배치결과.png';
    link.href = canvas.toDataURL();
    link.click();
  });
}

function clearStudents() {
  if(confirm('모든 데이터를 초기화할까요?')) {
    students = []; fixedSeats = []; applyGrid(); updateStudentUI();
  }
}

init();
</script>
</body>
</html>
